<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sense Preview — Game Log</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #f5f5f7; color: #1d1d1f; }
.header { background: #fff; border-bottom: 1px solid #d2d2d7; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 20px; font-weight: 600; }
.header .mode-badge { background: #34c759; color: #fff; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 12px; }
.header .refresh-btn { background: #007aff; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
.header .refresh-btn:hover { background: #0056cc; }
.auto-label { font-size: 11px; color: #86868b; margin-left: 8px; }

.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; padding: 16px 24px; }
.stat-card { background: #fff; border-radius: 12px; padding: 16px; border: 1px solid #d2d2d7; }
.stat-card .label { font-size: 11px; font-weight: 600; color: #86868b; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-card .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
.stat-card .sub { font-size: 12px; color: #86868b; margin-top: 2px; }
.green { color: #34c759; }
.red { color: #ff3b30; }
.blue { color: #007aff; }
.orange { color: #ff9500; }

.section { padding: 0 24px 16px; }
.section h2 { font-size: 15px; font-weight: 600; margin-bottom: 8px; color: #1d1d1f; }
.section .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
.section .tabs button { background: #e5e5ea; border: none; padding: 6px 14px; border-radius: 16px; font-size: 12px; font-weight: 600; cursor: pointer; color: #1d1d1f; }
.section .tabs button.active { background: #007aff; color: #fff; }

.table-wrap { background: #fff; border-radius: 12px; border: 1px solid #d2d2d7; overflow: hidden; max-height: 500px; overflow-y: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { background: #f5f5f7; font-weight: 600; text-align: left; padding: 8px 12px; position: sticky; top: 0; color: #86868b; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; border-bottom: 1px solid #d2d2d7; }
td { padding: 8px 12px; border-bottom: 1px solid #f0f0f0; }
tr:hover { background: #f5f5f7; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; }
.badge-win { background: #d1fae5; color: #059669; }
.badge-loss { background: #fee2e2; color: #dc2626; }
.badge-draw { background: #fef3c7; color: #d97706; }
.badge-open { background: #dbeafe; color: #2563eb; }
.badge-matched { background: #e0e7ff; color: #4f46e5; }
.badge-settled { background: #d1fae5; color: #059669; }
.badge-expired { background: #f3f4f6; color: #6b7280; }
.badge-settling { background: #fef3c7; color: #d97706; }
.mono { font-family: 'SF Mono', Monaco, monospace; font-size: 11px; }
.time-ago { color: #86868b; font-size: 11px; }

.events-log { background: #fff; border-radius: 12px; border: 1px solid #d2d2d7; padding: 12px; max-height: 400px; overflow-y: auto; font-family: 'SF Mono', Monaco, monospace; font-size: 11px; line-height: 1.6; }
.event-line { display: flex; gap: 8px; }
.event-time { color: #86868b; flex-shrink: 0; }
.event-msg { color: #1d1d1f; }
.event-msg.create { color: #007aff; }
.event-msg.join { color: #34c759; }
.event-msg.settle { color: #8b5cf6; }
.event-msg.expire { color: #ff9500; }
.event-msg.error { color: #ff3b30; }
.event-msg.queue { color: #86868b; }

.filter-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
.filter-row input { padding: 6px 12px; border: 1px solid #d2d2d7; border-radius: 8px; font-size: 12px; width: 200px; }
.filter-row select { padding: 6px 12px; border: 1px solid #d2d2d7; border-radius: 8px; font-size: 12px; background: #fff; }
</style>
</head>
<body>
<div class="header">
  <div style="display:flex;align-items:center;gap:12px">
    <h1>Sense Preview — Game Log</h1>
    <span class="mode-badge">FIAT / PREVIEW</span>
  </div>
  <div style="display:flex;align-items:center">
    <button class="refresh-btn" onclick="loadAll()">Refresh</button>
    <span class="auto-label" id="autoLabel">Auto-refresh: 10s</span>
  </div>
</div>

<div class="grid" id="statsGrid"></div>

<div class="section">
  <h2>Live Event Log</h2>
  <div class="events-log" id="eventsLog">Loading...</div>
</div>

<div class="section">
  <h2>Queue State</h2>
  <div class="tabs">
    <button class="active" onclick="showQueueTab('open',this)">Open</button>
    <button onclick="showQueueTab('matched',this)">Matched</button>
    <button onclick="showQueueTab('recent',this)">Recent Queue</button>
  </div>
  <div class="table-wrap" id="queueTable">Loading...</div>
</div>

<div class="section">
  <h2>Settled Matches</h2>
  <div class="filter-row">
    <input type="text" id="matchFilter" placeholder="Filter by player name..." oninput="renderMatches()">
    <select id="modeFilter" onchange="renderMatches()">
      <option value="">All modes</option>
      <option value="free">Free</option>
      <option value="paid">Paid</option>
    </select>
    <select id="resultFilter" onchange="renderMatches()">
      <option value="">All results</option>
      <option value="win">Wins</option>
      <option value="loss">Losses</option>
      <option value="draw">Draws</option>
    </select>
  </div>
  <div class="table-wrap" id="matchesTable">Loading...</div>
</div>

<script>
const PREVIEW_API = 'https://web-production-c6ec6.up.railway.app';
let dashData = null;
let queueData = null;
let currentQueueTab = 'open';

function timeAgo(ts) {
  if (!ts) return '';
  const d = Date.now() - new Date(ts).getTime();
  const s = Math.floor(d / 1000);
  if (s < 60) return s + 's ago';
  const m = Math.floor(s / 60);
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

function statusBadge(status) {
  const cls = { open: 'badge-open', matched: 'badge-matched', settled: 'badge-settled', expired: 'badge-expired', settling: 'badge-settling' }[status] || '';
  return `<span class="badge ${cls}">${status.toUpperCase()}</span>`;
}

function resultBadge(result) {
  const cls = { win: 'badge-win', loss: 'badge-loss', draw: 'badge-draw' }[result] || '';
  return `<span class="badge ${cls}">${result.toUpperCase()}</span>`;
}

async function loadAll() {
  try {
    const [dashResp, queueResp] = await Promise.all([
      fetch(PREVIEW_API + '/api/dashboard'),
      fetch(PREVIEW_API + '/api/debug/queue'),
    ]);
    dashData = await dashResp.json();
    queueData = await queueResp.json();
    renderStats();
    renderEvents();
    renderQueue();
    renderMatches();
    document.getElementById('autoLabel').textContent = 'Updated: ' + new Date().toLocaleTimeString();
  } catch (e) {
    console.error('Load failed:', e);
    document.getElementById('autoLabel').textContent = 'Error: ' + e.message;
  }
}

function renderStats() {
  const t = dashData.totals;
  const q = dashData.queue;
  const s = dashData.server;
  const r = dashData.resultDistribution;
  
  const winRate = t.totalGames > 0 ? ((r.wins / t.totalGames) * 100).toFixed(1) : '0';
  const drawRate = t.totalGames > 0 ? ((r.draws / t.totalGames) * 100).toFixed(1) : '0';
  
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card">
      <div class="label">Total Games</div>
      <div class="value">${t.totalGames}</div>
      <div class="sub">${t.gamesToday} today · ${t.gamesLastHour} last hour</div>
    </div>
    <div class="stat-card">
      <div class="label">Queue</div>
      <div class="value ${q.openWaiting > 0 ? 'blue' : ''}">${q.openWaiting} open</div>
      <div class="sub">${q.activeMatched} matched · ${q.settling} settling</div>
    </div>
    <div class="stat-card">
      <div class="label">Players</div>
      <div class="value">${t.uniquePlayers}</div>
      <div class="sub">${s.wsConnections} connected now</div>
    </div>
    <div class="stat-card">
      <div class="label">Results</div>
      <div class="value green">${r.wins}W</div>
      <div class="sub">${r.draws}D · ${r.losses}L · ${winRate}% win rate</div>
    </div>
    <div class="stat-card">
      <div class="label">Total Wagered</div>
      <div class="value">$${(t.totalWageredCents / 100).toFixed(2)}</div>
      <div class="sub">${t.paidGames} paid · ${t.freeGames} free</div>
    </div>
    <div class="stat-card">
      <div class="label">Server</div>
      <div class="value">${Math.floor(s.uptime / 60)}m</div>
      <div class="sub">${s.memoryMB}MB RAM · ${s.settleErrors.length} errors</div>
    </div>
  `;
}

function renderEvents() {
  const events = dashData.server.recentEvents || [];
  const el = document.getElementById('eventsLog');
  if (!events.length) { el.innerHTML = '<div style="color:#86868b">No events yet</div>'; return; }
  
  el.innerHTML = events.slice().reverse().map(e => {
    const msg = e.msg || '';
    let cls = 'queue';
    if (msg.startsWith('CREATED')) cls = 'create';
    else if (msg.startsWith('JOINED')) cls = 'join';
    else if (msg.startsWith('SETTLED') || msg.startsWith('SETTLE')) cls = 'settle';
    else if (msg.startsWith('EXPIRED') || msg.startsWith('STALE')) cls = 'expire';
    else if (msg.startsWith('ERROR') || msg.startsWith('CHAIN_FAIL')) cls = 'error';
    
    const time = e.t ? e.t.substring(11, 19) : '';
    return `<div class="event-line"><span class="event-time">${time}</span><span class="event-msg ${cls}">${msg}</span></div>`;
  }).join('');
}

function showQueueTab(tab, btn) {
  currentQueueTab = tab;
  document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderQueue();
}

function renderQueue() {
  const el = document.getElementById('queueTable');
  
  if (currentQueueTab === 'open') {
    const open = (queueData?.open || []);
    if (!open.length) { el.innerHTML = '<div style="padding:20px;text-align:center;color:#86868b">No open games</div>'; return; }
    el.innerHTML = `<table>
      <tr><th>Match ID</th><th>Tier</th><th>Player A</th><th>Created</th></tr>
      ${open.map(g => `<tr>
        <td class="mono">${g.match_id}</td>
        <td>${g.tier}</td>
        <td>${g.player_a}</td>
        <td class="time-ago">${timeAgo(g.created_at)}</td>
      </tr>`).join('')}
    </table>`;
  } else if (currentQueueTab === 'matched') {
    const matched = (dashData.recentQueue || []).filter(q => q.status === 'matched');
    if (!matched.length) { el.innerHTML = '<div style="padding:20px;text-align:center;color:#86868b">No matched games</div>'; return; }
    el.innerHTML = `<table>
      <tr><th>Match ID</th><th>Tier</th><th>Player A</th><th>Player B</th><th>A Ans</th><th>B Ans</th><th>Matched</th></tr>
      ${matched.map(g => `<tr>
        <td class="mono">${g.match_id}</td>
        <td>${g.tier}</td>
        <td>${g.player_a}</td>
        <td>${g.player_b || '—'}</td>
        <td>${g.answer_a !== null ? g.answer_a : '—'}</td>
        <td>${g.answer_b !== null ? g.answer_b : '—'}</td>
        <td class="time-ago">${timeAgo(g.matched_at)}</td>
      </tr>`).join('')}
    </table>`;
  } else {
    const recent = (dashData.recentQueue || []).slice(0, 50);
    el.innerHTML = `<table>
      <tr><th>Match ID</th><th>Status</th><th>Tier</th><th>Player A</th><th>Player B</th><th>A Time</th><th>B Time</th><th>Created</th></tr>
      ${recent.map(g => `<tr>
        <td class="mono">${g.match_id}</td>
        <td>${statusBadge(g.status)}</td>
        <td>${g.tier}</td>
        <td>${g.player_a}</td>
        <td>${g.player_b || '—'}</td>
        <td>${g.time_a !== null ? g.time_a + 'ms' : '—'}</td>
        <td>${g.time_b !== null ? g.time_b + 'ms' : '—'}</td>
        <td class="time-ago">${timeAgo(g.created_at)}</td>
      </tr>`).join('')}
    </table>`;
  }
}

function renderMatches() {
  const el = document.getElementById('matchesTable');
  let matches = dashData?.recentMatches || [];
  
  const nameFilter = document.getElementById('matchFilter').value.toLowerCase();
  const modeFilter = document.getElementById('modeFilter').value;
  const resultFilter = document.getElementById('resultFilter').value;
  
  if (nameFilter) matches = matches.filter(m => m.player_a.toLowerCase().includes(nameFilter) || m.player_b.toLowerCase().includes(nameFilter));
  if (modeFilter) matches = matches.filter(m => m.mode === modeFilter);
  if (resultFilter) matches = matches.filter(m => m.result_a === resultFilter || m.result_b === resultFilter);
  
  if (!matches.length) { el.innerHTML = '<div style="padding:20px;text-align:center;color:#86868b">No matches found</div>'; return; }
  
  el.innerHTML = `<table>
    <tr><th>Match</th><th>Mode</th><th>Player A</th><th>Result</th><th>Player B</th><th>Result</th><th>A Time</th><th>B Time</th><th>Wager</th><th>Settled</th></tr>
    ${matches.slice(0, 100).map(m => `<tr>
      <td class="mono">${m.match_id}</td>
      <td>${m.mode}</td>
      <td>${m.player_a}</td>
      <td>${resultBadge(m.result_a)}</td>
      <td>${m.player_b}</td>
      <td>${resultBadge(m.result_b)}</td>
      <td class="mono">${m.time_a !== null ? m.time_a + 'ms' : '—'}</td>
      <td class="mono">${m.time_b !== null ? m.time_b + 'ms' : '—'}</td>
      <td>$${(m.wager_cents / 100).toFixed(2)}</td>
      <td class="time-ago">${timeAgo(m.settled_at)}</td>
    </tr>`).join('')}
  </table>`;
}

// Auto-refresh every 10s
loadAll();
setInterval(loadAll, 10000);
</script>
</body>
</html>
